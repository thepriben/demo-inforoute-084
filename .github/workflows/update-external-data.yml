name: Update External Data

on:
  workflow_dispatch:
  schedule:
    - cron: "23 */3 * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Update external data
        run: python3 scripts/update_external_data.py
      - name: Commit changes
        run: |
          if git diff --quiet -- data/external; then
            echo "No external data changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/external
          git commit -m "Update external data"
          git push
